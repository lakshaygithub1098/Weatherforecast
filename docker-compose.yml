version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - WEATHER_API_BASE_URL=https://api.openweathermap.org/data/2.5
      - XGBOOST_MODEL_PATH=../models/xgboost_aqi_model.pkl
      - LSTM_MODEL_PATH=../models/lstm_aqi_model.h5
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=True
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    networks:
      - aqi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - aqi-network

networks:
  aqi-network:
    driver: bridge

volumes:
  models:
  data:
