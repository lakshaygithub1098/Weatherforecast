services:
  - name: delhi-aqi-backend
    type: web
    runtime: python
    runtimeVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000 --timeout 120
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "8000"
      - key: DEBUG
        value: "False"
      - key: CORS_ORIGINS
        value: '["https://delhi-aqi-predictor.vercel.app","http://localhost:5173"]'
